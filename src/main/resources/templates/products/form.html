<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isNew} ? 'Add New Product' : 'Edit Product'">Product Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/products}">
                <i class="bi bi-box-seam"></i> Product Manager
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/products}">
                            <i class="bi bi-list-check"></i> Products
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/products/new}">
                            <i class="bi bi-plus-circle"></i> Add Product
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <!-- Page Title -->
                <div class="mb-4">
                    <h1 class="page-title" th:text="${isNew} ? 'Add New Product' : 'Edit Product'"></h1>
                    <p class="text-muted">Fill in the form below to manage product information</p>
                </div>

                <!-- Error Alert -->
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="bi bi-exclamation-circle-fill"></i>
                    <span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Form Card -->
                <div class="card card-form">
                    <div class="card-body p-4">
                        <form th:action="${isNew} ? @{/products} : @{/products/{id}(id=${product.id})}" 
                              method="post" 
                              th:object="${product}">

                            <!-- Product Name -->
                            <div class="mb-3">
                                <label for="name" class="form-label">
                                    <i class="bi bi-box"></i> Product Name
                                    <span class="text-danger">*</span>
                                </label>
                                <input type="text" 
                                       class="form-control" 
                                       id="name" 
                                       th:field="*{name}"
                                       placeholder="Enter product name"
                                       th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}">
                                    <i class="bi bi-x-circle"></i>
                                    <span th:errors="*{name}"></span>
                                </div>
                            </div>

                            <!-- SKU -->
                            <div class="mb-3">
                                <label for="sku" class="form-label">
                                    <i class="bi bi-barcode"></i> SKU
                                    <span class="text-danger">*</span>
                                </label>
                                <input type="text" 
                                       class="form-control" 
                                       id="sku" 
                                       th:field="*{sku}"
                                       placeholder="Enter product SKU (unique identifier)"
                                       th:classappend="${#fields.hasErrors('sku')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('sku')}">
                                    <i class="bi bi-x-circle"></i>
                                    <span th:errors="*{sku}"></span>
                                </div>
                            </div>

                            <!-- Description -->
                            <div class="mb-3">
                                <label for="description" class="form-label">
                                    <i class="bi bi-file-text"></i> Description
                                    <span class="text-danger">*</span>
                                </label>
                                <textarea class="form-control" 
                                          id="description" 
                                          th:field="*{description}"
                                          rows="4"
                                          placeholder="Enter detailed product description"
                                          th:classappend="${#fields.hasErrors('description')} ? 'is-invalid' : ''"></textarea>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}">
                                    <i class="bi bi-x-circle"></i>
                                    <span th:errors="*{description}"></span>
                                </div>
                            </div>

                            <!-- Category -->
                            <div class="mb-3">
                                <label for="category" class="form-label">
                                    <i class="bi bi-tag"></i> Category
                                    <span class="text-danger">*</span>
                                </label>
                                <input type="text" 
                                       class="form-control" 
                                       id="category" 
                                       th:field="*{category}"
                                       placeholder="Enter product category (e.g., Electronics, Clothing)"
                                       list="categoryList"
                                       th:classappend="${#fields.hasErrors('category')} ? 'is-invalid' : ''">
                                <datalist id="categoryList">
                                    <option th:each="cat : ${categories}" th:value="${cat}"></option>
                                </datalist>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('category')}">
                                    <i class="bi bi-x-circle"></i>
                                    <span th:errors="*{category}"></span>
                                </div>
                            </div>

                            <!-- Row for Price and Stock -->
                            <div class="row">
                                <!-- Price -->
                                <div class="col-md-6 mb-3">
                                    <label for="price" class="form-label">
                                        <i class="bi bi-currency-dollar"></i> Price
                                        <span class="text-danger">*</span>
                                    </label>
                                    <div class="input-group">
                                        <span class="input-group-text">$</span>
                                        <input type="number" 
                                               class="form-control" 
                                               id="price" 
                                               th:field="*{price}"
                                               placeholder="0.00"
                                               step="0.01"
                                               min="0"
                                               th:classappend="${#fields.hasErrors('price')} ? 'is-invalid' : ''">
                                    </div>
                                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('price')}">
                                        <i class="bi bi-x-circle"></i>
                                        <span th:errors="*{price}"></span>
                                    </div>
                                </div>

                                <!-- Stock Quantity -->
                                <div class="col-md-6 mb-3">
                                    <label for="stockQuantity" class="form-label">
                                        <i class="bi bi-boxes"></i> Stock Quantity
                                        <span class="text-danger">*</span>
                                    </label>
                                    <input type="number" 
                                           class="form-control" 
                                           id="stockQuantity" 
                                           th:field="*{stockQuantity}"
                                           placeholder="0"
                                           min="0"
                                           th:classappend="${#fields.hasErrors('stockQuantity')} ? 'is-invalid' : ''">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('stockQuantity')}">
                                        <i class="bi bi-x-circle"></i>
                                        <span th:errors="*{stockQuantity}"></span>
                                    </div>
                                </div>
                            </div>

                            <!-- Form Actions -->
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                                <a th:href="@{/products}" class="btn btn-outline-secondary btn-lg">
                                    <i class="bi bi-x-circle"></i> Cancel
                                </a>
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="bi bi-check-circle"></i>
                                    <span th:text="${isNew} ? 'Create Product' : 'Update Product'"></span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-4 mt-5">
        <div class="container">
            <p class="mb-0">&copy; 2024 Product Management System. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
